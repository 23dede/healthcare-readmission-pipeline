version: 2

# =============================================================================
# SOURCES -- Bronze layer
# =============================================================================
sources:
  - name: bronze
    description: >
      Bronze layer: raw hospital data ingested from synthetic CSV files
      generated by Faker. No business transformation applied.
      PostgreSQL schema: bronze.
    schema: bronze
    tables:
      - name: patients_raw
        description: >
          Raw table containing all ingested hospital stays.
          Each row represents one unique stay (not deduplicated).
        columns:
          - name: patient_id
            description: Unique UUID identifier for the patient stay
            tests:
              - not_null
          - name: age
            description: Patient age in years at time of admission
            tests:
              - not_null
          - name: readmission_30j
            description: Binary target variable -- 1 if readmitted within 30 days
            tests:
              - not_null
              - accepted_values:
                  values: [0, 1]

# =============================================================================
# SILVER MODELS
# =============================================================================
models:

  - name: stg_patients
    description: >
      Cleaned Silver view of patient data. Applies type casting, text
      normalization, exclusion of corrupted rows, and derivation of new
      columns (tranche_age, flag_polymedication, etc.).
      Grain: 1 row = 1 patient stay.
    columns:

      - name: patient_id
        description: Unique UUID identifier -- functional primary key
        tests:
          - not_null
          - unique

      - name: age
        description: Patient age (18-95 after quality filter)
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 18
              max_value: 95

      - name: sexe
        description: Patient sex normalized to uppercase
        tests:
          - not_null
          - accepted_values:
              values: ['M', 'F']

      - name: tranche_age
        description: Clinical age bracket (18-44 / 45-64 / 65-74 / 75-84 / 85+)
        tests:
          - not_null
          - accepted_values:
              values: ['18-44', '45-64', '65-74', '75-84', '85+']

      - name: pathologie
        description: Main pathology of the stay (cleaned label)
        tests:
          - not_null

      - name: diagnostic_principal
        description: Simplified ICD-10 code in uppercase
        tests:
          - not_null

      - name: duree_sejour
        description: Length of stay in days (positive value)
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 45

      - name: nb_hospitalisations_precedentes
        description: Number of hospitalizations in the prior 12 months
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 10

      - name: nb_medicaments
        description: Number of medications prescribed during the stay
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 20

      - name: date_admission
        description: Admission date (DATE type)
        tests:
          - not_null

      - name: date_sortie
        description: Discharge date (DATE type)
        tests:
          - not_null

      - name: mode_sortie
        description: Discharge mode
        tests:
          - not_null
          - accepted_values:
              values: ['Domicile', 'Ssr', 'Ehpad', 'Transfert', 'Deces']

      - name: readmission_30j
        description: Target variable -- 1 if readmitted within 30 days
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

      - name: flag_polymedication
        description: TRUE if patient takes 5 or more medications (WHO criterion)
        tests:
          - not_null

  - name: stg_sejours
    description: >
      Silver view computing analytical metrics per stay: normalization of
      stay duration within pathology group (z-score), composite complexity
      index, clinical risk flags, and therapeutic intensity ratio.
      Grain: 1 row = 1 patient stay.
    columns:

      - name: patient_id
        description: Functional key -- join with stg_patients
        tests:
          - not_null
          - unique

      - name: indice_complexite
        description: >
          Composite stay complexity score [0-10].
          Weighting: stay duration 35%, medications 30%, prior history 35%.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 10

      - name: duree_zscore_patho
        description: >
          Z-score of stay duration within the same pathology.
          Positive value means abnormally long stay vs. pathology average.
        tests:
          - not_null

      - name: ratio_meds_duree
        description: >
          Medications-to-stay-duration ratio -- proxy for therapeutic intensity.
          High value indicates intensive treatment over a short stay.
        tests:
          - not_null

      - name: flag_antecedents_lourds
        description: TRUE if the patient has 3 or more hospitalizations in 12 months
        tests:
          - not_null

  - name: stg_diagnostics
    description: >
      Silver view enriching ICD-10 codes with the clinical reference:
      clinical group (CARDIO, PULMO, METABOL...), relative severity, and
      pathology-level readmission risk classification.
      Grain: 1 row = 1 patient stay.
    columns:

      - name: patient_id
        description: Functional key -- join with stg_patients
        tests:
          - not_null
          - unique

      - name: groupe_clinique
        description: Clinical group of the pathology
        tests:
          - not_null
          - accepted_values:
              values: ['CARDIO', 'PULMO', 'METABOL', 'NEPHRO', 'NEURO', 'INFECTIO', 'TRAUMA', 'AUTRE']

      - name: severite_relative
        description: Pathology severity score from 1 (low) to 5 (critical)
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 5

      - name: risque_readmission_patho
        description: Pathology-level readmission risk classification
        tests:
          - not_null
          - accepted_values:
              values: ['Faible', 'Modere', 'Eleve']

      - name: severite_normalisee
        description: Severity normalized between 0 and 1 (severite_relative / 5)
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
